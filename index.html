<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="hud-score">0</div>
    <div id="hud-best">Best: 0</div>
    <div id="hud-bars">
      <div id="oxy-label">O2</div>
      <div id="oxy-bar-bg"><div id="oxy-bar" style="width:100%;background:#0ff;"></div></div>
    </div>
  </div>

<script>
(function(){
"use strict";

// ── Constants ────────────────────────────────────────────────────────────────
const SEG_W = 24;
const BASE_BPM = 72;
const MAX_BPM = 140;
const BASE_SPEED = 2.2;
const MAX_SPEED = 7.5;
const BASE_GAP = 180;
const MIN_GAP = 90;
const OXY_MAX = 100;
const OXY_DRAIN_BASE = 1.8;
const OXY_DRAIN_MISS = 3.5;
const OXY_REFILL_PERFECT = 4;
const SUB_R = 14;
const MINE_R = 16;
const TIMING_WINDOW_PERFECT = 0.18;
const TIMING_WINDOW_GOOD = 0.32;

// ── URL challenge param ──────────────────────────────────────────────────────
const urlParams = new URLSearchParams(location.search);
const challengeScore = parseInt(urlParams.get('challenge')) || 0;

// ── Audio ────────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol, detune){
  vol = vol || 0.4; detune = detune || 0;
  const ac = getAudio();
  const g = ac.createGain();
  const o = ac.createOscillator();
  o.type = type;
  o.frequency.value = freq;
  o.detune.value = detune;
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}
function playBeat(){
  const ac = getAudio();
  const g = ac.createGain();
  const o = ac.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(80, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(40, ac.currentTime + 0.12);
  g.gain.setValueAtTime(0.55, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + 0.18);
  playTone(1200,'square',0.04,0.1);
}
function playPerfect(){ playTone(660,'sine',0.18,0.35); playTone(880,'sine',0.12,0.2); }
function playGood(){ playTone(440,'sine',0.14,0.25); }
function playMiss(){ playTone(160,'sawtooth',0.22,0.3); }
function playCrash(){
  const ac = getAudio();
  const buf = ac.createBuffer(1, Math.floor(ac.sampleRate*0.5), ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*0.1));
  const s = ac.createBufferSource();
  const g = ac.createGain(); g.gain.value = 0.7;
  s.buffer = buf; s.connect(g); g.connect(ac.destination); s.start();
}

// ── Canvas Setup ─────────────────────────────────────────────────────────────
const wrap = document.getElementById('wrap');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

function resize(){
  DPR = window.devicePixelRatio || 1;
  const r = wrap.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', function(){ resize(); if(gameState==='playing') initTunnel(); });

// ── State ────────────────────────────────────────────────────────────────────
let gameState = 'start';
let score = 0;
let bestScore = parseInt(localStorage.getItem('tideTap_best')||'0');
let deathReason = '';
let gameHue = 200;
let comboFlashT = 0;

// ── Player ───────────────────────────────────────────────────────────────────
const player = {
  x:0, y:0, vy:0,
  speed:BASE_SPEED,
  oxygen: OXY_MAX,
  combo: 0,
  multiplier: 1,
  penaltyT: 0,
  invincT: 0
};

// ── Beat / Pulse ─────────────────────────────────────────────────────────────
const beat = {
  bpm: BASE_BPM,
  period: 0,
  phase: 0,
  lastBeat: 0,
  rings: []
};

// ── Tunnel ───────────────────────────────────────────────────────────────────
let tunnel = [];
let tunnelOffset = 0;

// ── Hazards ──────────────────────────────────────────────────────────────────
let hazards = [];

// ── Particles ────────────────────────────────────────────────────────────────
let particles = [];

// ── Shockwaves ────────────────────────────────────────────────────────────────
let shockwaves = [];

// ── Effects ──────────────────────────────────────────────────────────────────
let shake = { trauma: 0 };
let vignetteAlpha = 0;

// ── HUD elements ─────────────────────────────────────────────────────────────
const hudScore  = document.getElementById('hud-score');
const hudBest   = document.getElementById('hud-best');
const oxyBar    = document.getElementById('oxy-bar');
const comboBadge = document.getElementById('combo-badge');

function updateHUD(){
  hudScore.textContent = Math.floor(score);
  hudBest.textContent  = 'Best: ' + bestScore + (challengeScore ? '  |  Beat: '+challengeScore : '');
  const op = player.oxygen / OXY_MAX;
  oxyBar.style.width = (op*100)+'%';
  const rr = op<0.3 ? 255 : Math.round(255*(1-op)*3);
  const gg = op>0.5 ? 255 : Math.round(255*op*2);
  oxyBar.style.backgroundColor = 'rgb('+rr+','+gg+',255)';
  if(player.combo >= 2){
    comboBadge.textContent = 'x'+player.multiplier;
    comboBadge.style.opacity = '1';
  } else {
    comboBadge.style.opacity = '0';
  }
}

// ── Tunnel generation ────────────────────────────────────────────────────────
function tunnelGap(dist){
  const t = Math.min(dist/8000, 1);
  return BASE_GAP - (BASE_GAP - MIN_GAP)*t*t;
}
function initTunnel(){
  tunnel = [];
  tunnelOffset = 0;
  const segs = Math.ceil(W/SEG_W) + 20;
  let cy = H/2, dcdy = 0;
  for(let i=0; i<segs; i++){
    cy += dcdy;
    dcdy += (Math.random()-0.5)*2.5;
    dcdy *= 0.85;
    cy = Math.max(H*0.2, Math.min(H*0.8, cy));
    const hg = tunnelGap(0)/2;
    tunnel.push({x: i*SEG_W, centerY: cy, halfGap: hg});
  }
}
function extendTunnel(dist){
  const maxX = tunnel[tunnel.length-1].x;
  if(maxX < tunnelOffset + W + SEG_W*10){
    const last = tunnel[tunnel.length-1];
    let cy = last.centerY;
    const hg = tunnelGap(dist)/2;
    cy += (Math.random()-0.5)*30;
    if(dist > 2000 && Math.random()<0.3) cy += (Math.random()-0.5)*60;
    cy = Math.max(H*0.15, Math.min(H*0.85, cy));
    tunnel.push({x: last.x+SEG_W, centerY: cy, halfGap: hg});
  }
  while(tunnel.length>0 && tunnel[0].x < tunnelOffset - SEG_W*2) tunnel.shift();
}

function getTunnelAt(worldX){
  for(let i=0;i<tunnel.length-1;i++){
    if(tunnel[i].x <= worldX && tunnel[i+1].x > worldX){
      const t = (worldX - tunnel[i].x)/SEG_W;
      return {
        centerY: tunnel[i].centerY*(1-t) + tunnel[i+1].centerY*t,
        halfGap:  tunnel[i].halfGap*(1-t)  + tunnel[i+1].halfGap*t
      };
    }
  }
  return {centerY: H/2, halfGap: BASE_GAP/2};
}

// ── Hazard spawning ──────────────────────────────────────────────────────────
function spawnHazard(dist){
  const density = Math.min(1, dist/5000);
  if(Math.random() > 0.012 + density*0.02) return;
  const spawnX = tunnelOffset + W + MINE_R + 20;
  const tun = getTunnelAt(spawnX);
  const spread = tun.halfGap * 0.7;
  const yOff = (Math.random()*2-1)*spread;
  hazards.push({
    x: spawnX,
    y: tun.centerY + yOff,
    r: MINE_R + Math.random()*6,
    vx: -(0.4 + Math.random()*0.5),
    vy: (Math.random()-0.5)*0.6,
    repelled: false,
    hue: Math.random()*360
  });
}

// ── Particles ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, preset){
  if(preset==='perfect'){
    for(let i=0;i<18;i++){
      const a = Math.PI*2*i/18;
      const sp = 2+Math.random()*4;
      particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,maxLife:1,r:3+Math.random()*3,color:'hsl('+(180+Math.random()*40)+',100%,70%)'});
    }
  } else if(preset==='good'){
    for(let i=0;i<10;i++){
      const a = Math.PI*2*Math.random();
      const sp = 1+Math.random()*3;
      particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,maxLife:0.7,r:2+Math.random()*2,color:'hsl('+(120+Math.random()*60)+',90%,65%)'});
    }
  } else if(preset==='miss'){
    for(let i=0;i<8;i++){
      const a = Math.PI*2*Math.random();
      const sp = 0.5+Math.random()*2;
      particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,maxLife:0.5,r:3+Math.random()*3,color:'hsl('+(220+Math.random()*40)+',60%,40%)'});
    }
  } else if(preset==='crash'){
    for(let i=0;i<30;i++){
      const a = Math.PI*2*Math.random();
      const sp = 1+Math.random()*8;
      particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,maxLife:1.5,r:2+Math.random()*6,color:'hsl('+(Math.random()*40+10)+',100%,'+(50+Math.random()*30)+'%)'});
    }
  }
}

// ── Shockwave ─────────────────────────────────────────────────────────────────
function emitShockwave(x, y, quality){
  const power = quality==='perfect' ? 1.0 : 0.6;
  shockwaves.push({x:x,y:y,r:SUB_R,maxR:120*power,life:1,power:power});
  hazards.forEach(function(h){
    const dx=h.x-x, dy=h.y-y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<130*power && d>1){
      const force = power*8*(1-d/(130*power));
      h.vx += dx/d*force;
      h.vy += dy/d*force;
      h.repelled = true;
    }
  });
}

// ── Game Init ─────────────────────────────────────────────────────────────────
function initGame(){
  player.x = W*0.22;
  player.y = H/2;
  player.vy = 0;
  player.speed = BASE_SPEED;
  player.oxygen = OXY_MAX;
  player.combo = 0;
  player.multiplier = 1;
  player.penaltyT = 0;
  player.invincT = 0;
  score = 0;
  gameHue = 200;
  beat.bpm = BASE_BPM;
  beat.period = 60000/BASE_BPM;
  beat.phase = 0;
  beat.lastBeat = performance.now();
  beat.rings = [];
  hazards = [];
  particles = [];
  shockwaves = [];
  shake.trauma = 0;
  vignetteAlpha = 0;
  tunnelOffset = 0;
  initTunnel();
  updateHUD();
}

// ── Tap handler ──────────────────────────────────────────────────────────────
function onTap(){
  if(gameState === 'start'){
    gameState = 'playing';
    getAudio();
    initGame();
    return;
  }
  if(gameState === 'gameover'){
    gameState = 'playing';
    initGame();
    return;
  }
  if(gameState !== 'playing') return;
  if(player.penaltyT > 0.3) return;

  const phase = beat.phase;
  const dist = Math.min(phase, 1-phase);
  let quality;
  if(dist <= TIMING_WINDOW_PERFECT) quality = 'perfect';
  else if(dist <= TIMING_WINDOW_GOOD) quality = 'good';
  else quality = 'miss';

  if(quality === 'perfect'){
    player.combo++;
    player.multiplier = Math.min(8, 1 + Math.floor(player.combo/3));
    player.speed = Math.min(MAX_SPEED, player.speed + 0.6);
    player.oxygen = Math.min(OXY_MAX, player.oxygen + OXY_REFILL_PERFECT);
    player.vy *= 0.3;
    emitShockwave(player.x, player.y, 'perfect');
    spawnParticles(player.x, player.y, 'perfect');
    playPerfect();
    shake.trauma = Math.max(shake.trauma, 0.15);
    score += 50 * player.multiplier;
  } else if(quality === 'good'){
    player.combo++;
    player.multiplier = Math.min(8, 1 + Math.floor(player.combo/3));
    player.speed = Math.min(MAX_SPEED, player.speed + 0.3);
    emitShockwave(player.x, player.y, 'good');
    spawnParticles(player.x, player.y, 'good');
    playGood();
    score += 20 * player.multiplier;
  } else {
    player.combo = 0;
    player.multiplier = 1;
    player.penaltyT = 0.5;
    player.vy += (Math.random()-0.5)*6;
    spawnParticles(player.x, player.y, 'miss');
    playMiss();
  }
  comboFlashT = 0.5;
}

// ── Input ────────────────────────────────────────────────────────────────────
canvas.addEventListener('pointerdown', function(e){ e.preventDefault(); onTap(); });
document.addEventListener('keydown', function(e){
  if(e.code==='Space'||e.code==='Enter'){ e.preventDefault(); onTap(); }
});

// ── Near-miss scoring ────────────────────────────────────────────────────────
function checkNearMiss(){
  hazards.forEach(function(h){
    if(h.repelled) return;
    const dx=h.x-player.x, dy=h.y-player.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    const closeRange = SUB_R + h.r + 30;
    if(d < closeRange && d > SUB_R + h.r + 2 && player.speed > BASE_SPEED+1){
      score += 5 * player.multiplier;
    }
  });
}

// ── Collision detection ──────────────────────────────────────────────────────
function checkCollisions(){
  if(player.invincT > 0) return false;
  for(let i=0;i<hazards.length;i++){
    const h = hazards[i];
    const dx=h.x-player.x, dy=h.y-player.y;
    const d2=dx*dx+dy*dy;
    if(d2 < (SUB_R+h.r)*(SUB_R+h.r)) return 'mine';
  }
  const tun = getTunnelAt(tunnelOffset + player.x);
  const topWall = tun.centerY - tun.halfGap;
  const botWall = tun.centerY + tun.halfGap;
  if(player.y - SUB_R < topWall || player.y + SUB_R > botWall) return 'wall';
  return false;
}

// ── Game Over ────────────────────────────────────────────────────────────────
function triggerDeath(reason){
  deathReason = reason;
  gameState = 'gameover';
  playCrash();
  shake.trauma = 1.0;
  spawnParticles(player.x, player.y, 'crash');
  if(score > bestScore){
    bestScore = Math.floor(score);
    localStorage.setItem('tideTap_best', bestScore);
  }
  updateHUD();
}

// ── Share ────────────────────────────────────────────────────────────────────
let copyFeedback = false;
let copyFeedbackT = 0;
function shareScore(){
  const url = location.origin + location.pathname + '?challenge=' + Math.floor(score);
  const text = 'I scored '+Math.floor(score)+' in Tide Tap! Can you beat me?';
  if(navigator.share){
    navigator.share({title:'Tide Tap',text:text,url:url}).catch(function(){});
  } else {
    navigator.clipboard.writeText(text+'\n'+url).then(function(){
      copyFeedback=true; copyFeedbackT=2;
    }).catch(function(){});
  }
}

// ── Draw helpers ─────────────────────────────────────────────────────────────
function drawRoundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawButton(label, x, y, w, h, hue, alpha){
  if(alpha === undefined) alpha = 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = 'hsl('+hue+',100%,60%)';
  ctx.shadowBlur = 18;
  const g = ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0, 'hsl('+hue+',80%,35%)');
  g.addColorStop(1, 'hsl('+hue+',80%,22%)');
  ctx.fillStyle = g;
  drawRoundRect(x,y,w,h,12);
  ctx.fill();
  ctx.strokeStyle = 'hsl('+hue+',100%,55%)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = "bold 16px 'Segoe UI',Arial,sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x+w/2, y+h/2);
  ctx.restore();
}

// ── Draw background ──────────────────────────────────────────────────────────
function drawBackground(hue){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, 'hsl('+hue+',60%,4%)');
  g.addColorStop(0.5, 'hsl('+(hue+20)+',50%,7%)');
  g.addColorStop(1, 'hsl('+(hue+40)+',40%,5%)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

// ── Draw tunnel ──────────────────────────────────────────────────────────────
function drawTunnel(hue){
  if(tunnel.length<2) return;
  const topPts=[], botPts=[];
  for(let i=0;i<tunnel.length;i++){
    const seg = tunnel[i];
    const sx = seg.x - tunnelOffset;
    if(sx < -SEG_W*2 || sx > W+SEG_W*2) continue;
    topPts.push({x:sx, y:seg.centerY - seg.halfGap});
    botPts.push({x:sx, y:seg.centerY + seg.halfGap});
  }
  if(topPts.length<2) return;

  ctx.beginPath();
  ctx.moveTo(topPts[0].x, 0);
  ctx.lineTo(topPts[0].x, topPts[0].y);
  for(let i=1;i<topPts.length;i++) ctx.lineTo(topPts[i].x, topPts[i].y);
  ctx.lineTo(topPts[topPts.length-1].x, 0);
  ctx.closePath();
  const tg = ctx.createLinearGradient(0,0,0,H*0.5);
  tg.addColorStop(0, 'hsl('+hue+',50%,12%)');
  tg.addColorStop(1, 'hsl('+hue+',40%,8%)');
  ctx.fillStyle = tg;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(botPts[0].x, H);
  ctx.lineTo(botPts[0].x, botPts[0].y);
  for(let i=1;i<botPts.length;i++) ctx.lineTo(botPts[i].x, botPts[i].y);
  ctx.lineTo(botPts[botPts.length-1].x, H);
  ctx.closePath();
  const bg = ctx.createLinearGradient(0,H*0.5,0,H);
  bg.addColorStop(0, 'hsl('+hue+',40%,8%)');
  bg.addColorStop(1, 'hsl('+hue+',50%,12%)');
  ctx.fillStyle = bg;
  ctx.fill();

  ctx.save();
  ctx.shadowBlur = 14;
  ctx.shadowColor = 'hsl('+(hue+60)+',80%,50%)';
  ctx.strokeStyle = 'hsl('+(hue+60)+',80%,45%)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(topPts[0].x, topPts[0].y);
  for(let i=1;i<topPts.length;i++) ctx.lineTo(topPts[i].x, topPts[i].y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(botPts[0].x, botPts[0].y);
  for(let i=1;i<botPts.length;i++) ctx.lineTo(botPts[i].x, botPts[i].y);
  ctx.stroke();
  ctx.restore();
}

// ── Draw sub ─────────────────────────────────────────────────────────────────
function drawSub(hue, now){
  const x=player.x, y=player.y;
  ctx.save();
  ctx.shadowColor = 'hsl('+hue+',100%,70%)';
  ctx.shadowBlur = 22;
  ctx.beginPath();
  ctx.ellipse(x, y, SUB_R+4, SUB_R-2, 0, 0, Math.PI*2);
  const sg = ctx.createRadialGradient(x-4,y-4,2,x,y,SUB_R+4);
  sg.addColorStop(0, 'hsl('+hue+',80%,75%)');
  sg.addColorStop(1, 'hsl('+(hue+20)+',60%,35%)');
  ctx.fillStyle = sg;
  ctx.fill();
  ctx.fillStyle = 'hsl('+hue+',70%,55%)';
  ctx.fillRect(x-4, y-SUB_R-8, 8, 8);
  ctx.strokeStyle = 'hsl('+(hue+40)+',80%,65%)';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  const propT = now*0.004;
  for(let i=0;i<3;i++){
    const a = propT + i*Math.PI*2/3;
    ctx.beginPath();
    ctx.moveTo(x-(SUB_R+4), y);
    ctx.lineTo(x-(SUB_R+4)+Math.cos(a)*8, y+Math.sin(a)*8);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.arc(x+4, y-2, 4, 0, Math.PI*2);
  ctx.fillStyle = 'hsla('+(hue+180)+',80%,80%,0.8)';
  ctx.fill();
  ctx.restore();
}

// ── Draw beat rings ──────────────────────────────────────────────────────────
function drawBeatRings(hue){
  const r = (beat.phase * 80) + SUB_R + 8;
  const alpha = 1 - beat.phase;
  const perfR_lo = (0.5-TIMING_WINDOW_PERFECT)*80 + SUB_R + 8;
  const perfR_hi = (0.5+TIMING_WINDOW_PERFECT)*80 + SUB_R + 8;
  const goodR_lo = (0.5-TIMING_WINDOW_GOOD)*80 + SUB_R + 8;
  const goodR_hi = (0.5+TIMING_WINDOW_GOOD)*80 + SUB_R + 8;

  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.strokeStyle = 'hsl(120,100%,60%)';
  ctx.lineWidth = (goodR_hi - goodR_lo);
  ctx.beginPath();
  ctx.arc(player.x, player.y, (goodR_lo+goodR_hi)/2, 0, Math.PI*2);
  ctx.stroke();
  ctx.strokeStyle = 'hsl(180,100%,70%)';
  ctx.lineWidth = (perfR_hi - perfR_lo);
  ctx.beginPath();
  ctx.arc(player.x, player.y, (perfR_lo+perfR_hi)/2, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = alpha * 0.85;
  ctx.shadowColor = 'hsl('+hue+',100%,70%)';
  ctx.shadowBlur = 12;
  ctx.strokeStyle = 'hsl('+hue+',100%,70%)';
  ctx.lineWidth = 2.5 - beat.phase;
  ctx.beginPath();
  ctx.arc(player.x, player.y, r, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();

  beat.rings.forEach(function(ring){
    ctx.save();
    ctx.globalAlpha = ring.life * 0.5;
    ctx.strokeStyle = 'hsl('+(hue+40)+',80%,65%)';
    ctx.lineWidth = 1.5 * ring.life;
    ctx.beginPath();
    ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  });
}

// ── Draw hazards ─────────────────────────────────────────────────────────────
function drawHazards(now){
  hazards.forEach(function(h){
    const sx = h.x - tunnelOffset;
    ctx.save();
    ctx.shadowColor = 'hsl('+h.hue+',100%,60%)';
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.arc(sx, h.y, h.r, 0, Math.PI*2);
    const mg = ctx.createRadialGradient(sx-h.r*0.3, h.y-h.r*0.3, 1, sx, h.y, h.r);
    mg.addColorStop(0, 'hsl('+h.hue+',70%,55%)');
    mg.addColorStop(1, 'hsl('+h.hue+',60%,20%)');
    ctx.fillStyle = mg;
    ctx.fill();
    ctx.strokeStyle = 'hsl('+h.hue+',80%,50%)';
    ctx.lineWidth = 2;
    for(let i=0;i<8;i++){
      const a = Math.PI*2*i/8 + now*0.001;
      ctx.beginPath();
      ctx.moveTo(sx+Math.cos(a)*h.r, h.y+Math.sin(a)*h.r);
      ctx.lineTo(sx+Math.cos(a)*(h.r+6), h.y+Math.sin(a)*(h.r+6));
      ctx.stroke();
    }
    ctx.restore();
  });
}

// ── Draw shockwaves ──────────────────────────────────────────────────────────
function drawShockwaves(hue){
  shockwaves.forEach(function(sw){
    ctx.save();
    ctx.globalAlpha = sw.life * 0.6;
    ctx.shadowColor = 'hsl('+(hue+40)+',100%,80%)';
    ctx.shadowBlur = 20;
    ctx.strokeStyle = 'hsl('+(hue+40)+',100%,80%)';
    ctx.lineWidth = 3 * sw.life;
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  });
}

// ── Draw particles ────────────────────────────────────────────────────────────
function drawParticles(){
  particles.forEach(function(p){
    ctx.save();
    ctx.globalAlpha = p.life/p.maxLife;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * (p.life/p.maxLife), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// ── Draw vignette ─────────────────────────────────────────────────────────────
function drawVignette(alpha, hue){
  if(alpha <= 0) return;
  const g = ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.9);
  g.addColorStop(0, 'hsla('+hue+',80%,20%,0)');
  g.addColorStop(1, 'hsla('+hue+',80%,5%,'+alpha+')');
  ctx.save();
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

// ── Start Screen ─────────────────────────────────────────────────────────────
function drawStart(t){
  const hue = (t*20)%360;
  drawBackground(hue);
  ctx.save();
  ctx.globalAlpha = 0.3;
  drawTunnel(hue);
  ctx.restore();

  const demoPhase = (t*BASE_BPM/60)%1;
  const dr = demoPhase*90 + 30;
  ctx.save();
  ctx.globalAlpha = (1-demoPhase)*0.8;
  ctx.strokeStyle = 'hsl('+hue+',100%,70%)';
  ctx.lineWidth = 2;
  ctx.shadowColor = 'hsl('+hue+',100%,70%)';
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.arc(W/2, H/2, dr, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.textAlign = 'center';
  ctx.shadowColor = 'hsl('+hue+',100%,60%)';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#fff';
  ctx.font = "bold 52px 'Segoe UI',Arial,sans-serif";
  ctx.fillText('TIDE TAP', W/2, H/2 - 90);
  ctx.shadowBlur = 0;
  ctx.font = "18px 'Segoe UI',Arial,sans-serif";
  ctx.fillStyle = 'hsl('+hue+',80%,75%)';
  ctx.fillText('Pilot your sub to the beat', W/2, H/2 - 52);
  ctx.restore();

  if(challengeScore){
    ctx.save();
    ctx.textAlign='center';
    ctx.fillStyle='hsl(60,100%,70%)';
    ctx.font="bold 20px 'Segoe UI',Arial,sans-serif";
    ctx.fillText('Beat '+challengeScore+'!', W/2, H/2 - 20);
    ctx.restore();
  }

  const pulse = 0.7 + 0.3*Math.sin(t*3);
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = "bold 22px 'Segoe UI',Arial,sans-serif";
  ctx.fillText('Tap to Start', W/2, H/2 + 30);
  ctx.restore();

  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = "14px 'Segoe UI',Arial,sans-serif";
  ctx.fillText('Tap when the pulse ring hits the window', W/2, H/2 + 70);
  ctx.fillText('Perfect = boost + oxygen refill', W/2, H/2 + 92);
  ctx.fillText('Miss = turbulence + oxygen drain', W/2, H/2 + 114);
  ctx.restore();

  if(bestScore > 0){
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = "14px 'Segoe UI',Arial,sans-serif";
    ctx.fillText('Best: '+bestScore, W/2, H - 60);
    ctx.restore();
  }
}

// ── Game Over Screen ──────────────────────────────────────────────────────────
const shareBtn  = {x:0,y:0,w:0,h:0};
const retryBtn  = {x:0,y:0,w:0,h:0};
function drawGameOver(t){
  const hue = (t*15)%360;
  drawBackground(hue);
  drawTunnel(hue);
  drawParticles();

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0,0,W,H);
  ctx.restore();

  ctx.save();
  ctx.textAlign='center';
  ctx.shadowColor = '#f44';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#f88';
  ctx.font = "bold 24px 'Segoe UI',Arial,sans-serif";
  const reason = deathReason==='mine'?'Crashed into a Mine!':deathReason==='wall'?'Hit the Wall!':'Out of Oxygen!';
  ctx.fillText(reason, W/2, H/2-120);

  ctx.shadowColor = 'hsl('+hue+',100%,70%)';
  ctx.shadowBlur = 30;
  ctx.fillStyle='#fff';
  ctx.font="bold 60px 'Segoe UI',Arial,sans-serif";
  ctx.fillText(Math.floor(score), W/2, H/2-50);

  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.font="18px 'Segoe UI',Arial,sans-serif";
  ctx.fillText('Best: '+bestScore, W/2, H/2+5);

  if(score >= bestScore && score > 0){
    ctx.fillStyle='hsl(60,100%,70%)';
    ctx.font="bold 16px 'Segoe UI',Arial,sans-serif";
    ctx.fillText('New Best!', W/2, H/2+28);
  }
  if(challengeScore && score > challengeScore){
    ctx.fillStyle='hsl(120,100%,70%)';
    ctx.font="bold 16px 'Segoe UI',Arial,sans-serif";
    ctx.fillText('You beat the challenge ('+challengeScore+')!', W/2, H/2+52);
  }
  ctx.restore();

  const bw=200, bh=44, cx=W/2;
  retryBtn.x=cx-bw/2; retryBtn.y=H/2+80; retryBtn.w=bw; retryBtn.h=bh;
  shareBtn.x=cx-bw/2; shareBtn.y=H/2+136; shareBtn.w=bw; shareBtn.h=bh;
  drawButton('Tap to Retry', retryBtn.x, retryBtn.y, retryBtn.w, retryBtn.h, hue);
  drawButton('Challenge a Friend', shareBtn.x, shareBtn.y, shareBtn.w, shareBtn.h, hue+120);

  if(copyFeedback){
    ctx.save();
    ctx.textAlign='center';
    ctx.fillStyle='hsl(120,100%,70%)';
    ctx.font="14px 'Segoe UI',Arial,sans-serif";
    ctx.fillText('Link copied!', W/2, shareBtn.y+shareBtn.h+20);
    ctx.restore();
  }
}

// ── Share button tap detection ────────────────────────────────────────────────
canvas.addEventListener('pointerdown', function(e){
  if(gameState!=='gameover') return;
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX-r.left)*(W/r.width);
  const my = (e.clientY-r.top)*(H/r.height);
  if(mx>=shareBtn.x && mx<=shareBtn.x+shareBtn.w && my>=shareBtn.y && my<=shareBtn.y+shareBtn.h){
    e.stopPropagation();
    shareScore();
  }
});

// ── Main update ───────────────────────────────────────────────────────────────
let lastTime = 0;
let totalTime = 0;

function update(now){
  const rawDt = now - lastTime;
  lastTime = now;
  const dt = Math.min(rawDt, 50) / 1000;
  totalTime += dt;
  if(gameState==='playing') updateGame(dt, now);
  if(copyFeedback){ copyFeedbackT-=dt; if(copyFeedbackT<=0) copyFeedback=false; }
}

function updateGame(dt, now){
  beat.period = 60000/beat.bpm;
  const elapsed = now - beat.lastBeat;
  beat.phase = elapsed / beat.period;

  if(beat.phase >= 1){
    beat.lastBeat = now - (elapsed % beat.period);
    beat.phase = (elapsed % beat.period) / beat.period;
    beat.rings.push({x:player.x, y:player.y, r:SUB_R+8, life:1});
    playBeat();
  }

  const distScore = tunnelOffset;
  const diffT = Math.min(distScore/10000, 1);
  beat.bpm = BASE_BPM + (MAX_BPM-BASE_BPM)*diffT;
  player.speed = Math.max(BASE_SPEED, player.speed - dt*0.4);
  player.speed = Math.max(BASE_SPEED + (MAX_SPEED-BASE_SPEED)*diffT*0.5, player.speed);

  tunnelOffset += player.speed;
  extendTunnel(distScore);

  player.vy += 120 * dt;
  player.vy -= 40 * dt;
  player.vy += Math.sin(totalTime*(0.3 + diffT*0.5))*20*dt*(diffT*0.8+0.2);
  player.vy *= (1 - 6*dt);
  player.y += player.vy * dt;

  if(player.penaltyT > 0) player.penaltyT -= dt;
  if(player.invincT > 0)  player.invincT  -= dt;

  const drain = player.penaltyT > 0 ? OXY_DRAIN_MISS : OXY_DRAIN_BASE;
  player.oxygen -= drain * dt;
  player.oxygen  = Math.max(0, player.oxygen);
  if(player.oxygen <= 0){ triggerDeath('oxygen'); return; }

  gameHue = (200 + diffT*120 + player.combo*5) % 360;
  score += player.speed * player.multiplier * dt * 2;
  checkNearMiss();

  beat.rings.forEach(function(rr){ rr.r += 80*dt; rr.life -= 1.5*dt; });
  beat.rings = beat.rings.filter(function(rr){ return rr.life>0; });

  spawnHazard(distScore);
  hazards.forEach(function(h){
    h.x += h.vx * player.speed * 0.5 + h.vx;
    h.y += h.vy;
    h.vy *= 0.98;
    h.vx *= 0.98;
  });
  hazards = hazards.filter(function(h){
    const sx = h.x - tunnelOffset;
    return sx > -MINE_R*3 && sx < W + MINE_R*3;
  });

  shockwaves.forEach(function(sw){ sw.r += 200*dt; sw.life -= 2.5*dt; });
  shockwaves = shockwaves.filter(function(sw){ return sw.life>0; });

  particles.forEach(function(p){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.vx*=0.97; p.life-=dt; });
  particles = particles.filter(function(p){ return p.life>0; });

  shake.trauma = Math.max(0, shake.trauma - 2*dt);

  const oxyFrac = player.oxygen/OXY_MAX;
  vignetteAlpha = oxyFrac < 0.3 ? (1-oxyFrac/0.3)*0.7 : 0;
  if(player.penaltyT > 0) vignetteAlpha = Math.max(vignetteAlpha, 0.3);

  if(comboFlashT>0) comboFlashT -= dt;

  const hit = checkCollisions();
  if(hit) triggerDeath(hit);
  else updateHUD();
}

// ── Draw ─────────────────────────────────────────────────────────────────────
function draw(now){
  ctx.save();
  const shakeAmt = shake.trauma * shake.trauma * 18;
  if(shakeAmt > 0.1){
    ctx.translate((Math.random()*2-1)*shakeAmt, (Math.random()*2-1)*shakeAmt);
  }

  if(gameState==='start'){
    drawStart(now/1000);
  } else if(gameState==='playing'){
    drawBackground(gameHue);
    drawTunnel(gameHue);
    drawShockwaves(gameHue);
    drawBeatRings(gameHue);
    drawSub(gameHue, now);
    drawHazards(now);
    drawParticles();
    drawVignette(vignetteAlpha, 0);
    if(player.penaltyT > 0){
      ctx.save();
      ctx.globalAlpha = player.penaltyT * 0.3;
      ctx.fillStyle = '#f04';
      ctx.fillRect(0,0,W,H);
      ctx.restore();
    }
  } else if(gameState==='gameover'){
    drawGameOver(now/1000);
  }

  ctx.restore();
}

// ── RAF loop ──────────────────────────────────────────────────────────────────
function loop(now){
  update(now);
  draw(now);
  requestAnimationFrame(loop);
}

hudBest.textContent = 'Best: '+bestScore+(challengeScore?' | Beat '+challengeScore:'');
initTunnel();
requestAnimationFrame(function(t){ lastTime=t; requestAnimationFrame(loop); });

})();
</script>
